name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: cli/package-lock.json

      - name: Install CLI dependencies
        run: npm ci
        working-directory: cli

      - name: Run fixture tests
        run: npm test
        working-directory: cli

      - name: Validate Riverstone Coffee example
        run: node bin/cas.js validate ../examples/riverstone-coffee
        working-directory: cli

      - name: Export Riverstone Coffee example (all adapters)
        run: |
          for adapter in claude gpt gemini cursor generic; do
            node bin/cas.js export $adapter ../examples/riverstone-coffee
          done
        working-directory: cli
